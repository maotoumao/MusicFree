name: 构建APK
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 安装 JDK（安卓打包必须）
      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 安装 Node.js 24
      - name: 安装 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      # 安装项目依赖
      - name: 安装依赖
        run: yarn install

      # 关键：给 gradlew 加执行权限（Linux 必须）
      - name: 赋予 gradlew 执行权限
        run: chmod +x ./android/gradlew

      # 直接用 Linux 原生命令打包，绕开 package.json 里的 Windows 命令
      - name: 构建 Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 上传正确路径的 APK
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: MusicFree-APK
          path: android/app/build/outputs/apk/release/app-release.apk
