name: 构建APK
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'

      - name: 安装项目依赖
        run: yarn install

      # 自动尝试所有常见的打包命令，总有一个能命中
      - name: 构建APK
        run: |
          yarn run build:android || \
          yarn run build || \
          npm run build:android || \
          npm run build || \
          echo "没有找到可用的打包命令，请检查 package.json 里的 scripts" && exit 1

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: XlingMusic-APK
          path: release/
